apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1
  - name: Tempo
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    orgId: 1
    access: proxy
    url: http://prometheus:9090
    jsonData:
      httpMethod: POST
      timeInterval: 5s

  - name: Loki
    type: loki
    uid: loki
    orgId: 1
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: 'trace_id=(\\w+)'
          name: trace_id
          url: "${__value.raw}"
          urlDisplayLabel: "Open Trace"

  - name: Tempo
    type: tempo
    uid: tempo
    orgId: 1
    access: proxy
    url: http://tempo:3200
    isDefault: true
    jsonData:
      serviceMap:
        datasourceUid: prometheus
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        customQuery: true
        query: >
          {service_name="$${__span.tags["service.name"]}"}
          | trace_id="$${__trace.traceId}"
